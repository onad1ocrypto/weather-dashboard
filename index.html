<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Kontainer Animasi Awan -->
    <div class="clouds-container">
        <div class="cloud" style="top: 10%; animation-delay: 0s;">☁️</div>
        <div class="cloud" style="top: 30%; animation-delay: 5s;">☁️</div>
        <div class="cloud" style="top: 60%; animation-delay: 10s;">☁️</div>
    </div>
    
    <div class="weather-card">
        <h1>Weather Dashboard</h1>
        <div id="datetime"></div>
        <input type="text" id="cityInput" placeholder="Enter city name..." onkeypress="handleEnter(event)">
        <button onclick="getWeather()">Get Weather</button>
        <div id="result">
            <h2 id="cityName">City</h2>
            <img id="weatherIcon" src="" alt="weather icon" style="display:none; margin: 10px auto;">
            <p id="temp">Temperature: --°C</p>
            <p id="desc">Condition: --</p>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
